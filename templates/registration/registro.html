{% extends "base_auth.html" %}
{% load static %}

{% block title %}STOKKA - Registrarse{% endblock %}

{% block content %}
<div class="register-container py-5" style="width: 95%; max-width: 950px;">
    <h2 class="auth-subtitle text-center text-white mb-5" style="letter-spacing: 4px; font-weight: 400; text-transform: uppercase;">REGISTRARSE</h2>
    
    {% if error %}
    <div class="alert alert-danger py-2 px-3 mb-4 border-0 rounded-3 text-center">
        {{ error }}
    </div>
    {% endif %}

    <form method="POST">
        {% csrf_token %}
        <div class="row align-items-center g-4">
            
            <div class="col-12 col-md-5">
                <div class="mb-3">
                    <label class="text-white small mb-1 d-block">Nombre *</label>
                    <input type="text" name="nombre" class="form-control border-0 rounded-3 py-2" placeholder="Tu nombre" required>
                </div>
                <div class="mb-3">
                    <label class="text-white small mb-1 d-block">Apellido (Opcional)</label>
                    <input type="text" name="apellido" class="form-control border-0 rounded-3 py-2" placeholder="Tu apellido">
                </div>
                <div class="mb-3">
                    <label class="text-white small mb-1 d-block">Nombre Usuario *</label>
                    <input type="text" name="usuario" class="form-control border-0 rounded-3 py-2" placeholder="Nombre de usuario" required>
                </div>
            </div>

            <div class="col-12 col-md-2 text-center my-4 my-md-0">
                <a href="{% url 'login' %}">
                    <img src="{% static 'assets/Logo stokka.png' %}" class="stokka-icon" style="width: 120px; transition: 0.3s;" alt="Logo">
                </a>
            </div>

            <div class="col-12 col-md-5">
                <div class="mb-3">
                    <label class="text-white small mb-1 d-block">Email *</label>
                    <input type="email" name="email" class="form-control border-0 rounded-3 py-2" placeholder="email@ejemplo.com" required>
                </div>
                <div class="mb-3">
                    <label class="text-white small mb-1 d-block">Contraseña *</label>
                    <input type="password" name="password" class="form-control border-0 rounded-3 py-2" placeholder="********" required>
                </div>
                <div class="mb-3">
                    <label class="text-white small mb-1 d-block">Teléfono (Opcional)</label>
                    <input type="tel" name="telefono" class="form-control border-0 rounded-3 py-2" placeholder="600 000 000">
                </div>
            </div>

            <div class="col-12 text-center mt-5">
                <button type="submit" class="btn btn-light fw-bold text-uppercase px-5 py-2" 
                        style="color: var(--verde-stokka); border-radius: 10px; min-width: 250px;">
                    Confirmar
                </button>
            </div>
        </div>
    </form>
</div>

<style>
    .stokka-icon:hover { transform: scale(1.05); }
    /* Mantenemos la tipografía Merriweather para los inputs */
    input.form-control { font-family: 'Merriweather', serif; font-size: 14px; }
</style>
{% endblock %}
