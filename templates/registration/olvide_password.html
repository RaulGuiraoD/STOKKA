{% extends 'layouts/base_auth.html' %}
{% block content %}
<div class="login-box text-center pb-5" style="max-width: 400px; width: 100%;">
    <h2 class="auth-subtitle mb-4 text-white" style="letter-spacing: 3px; font-weight: 400;">
        RECUPERAR CONTRASEÑA
    </h2>

    {% if messages %}
        {% for message in messages %}
        <div class="alert alert-{{ message.tags }} py-2 small mb-3">{{ message }}</div>
        {% endfor %}
    {% endif %}

    <p class="text-white small mb-4">
        Introduce tu email y te enviaremos un enlace para restablecer tu contraseña.
    </p>

    <form method="POST">
        {% csrf_token %}
        <div class="text-start mb-4">
            <label class="text-white small mb-1 d-block">Email</label>
            <input type="email" name="email" class="form-control border-0 rounded-2 py-2"
                   placeholder="user@gmail.com" style="background: var(--blanco);" required>
        </div>
        <button type="submit" class="btn btn-light fw-bold text-uppercase w-100 py-2"
                style="color: var(--verde-stokka); border-radius: 10px;">
            Enviar enlace
        </button>
    </form>

    <a href="{% url 'login' %}" class="d-block mt-4 text-white text-decoration-underline small">
        Volver al login
    </a>
</div>
{% endblock %}
