{% load static %}
<div class="px-2 px-md-3 pb-3">
    <div class="text-center mb-4">
        <h3 class="fw-bold text-dark fs-4 fs-md-3">
            <i class="fa-solid fa-user-pen me-2" style="color: var(--verde-stokka);"></i>
            Editar Mi Información
        </h3>
        <p class="text-muted small">Actualiza tus datos personales y de seguridad de tu cuenta</p>
    </div>

    <form method="POST" action="{% url 'editar_perfil' %}">
        {% csrf_token %}
        <div class="row g-3">
            <div class="col-12 col-md-6">
                <label class="form-label fw-bold small text-uppercase text-muted">Nombre</label>
                <input type="text" name="nombre" value="{{ user.first_name }}"
                    class="form-control stokka-input bg-light shadow-none">
            </div>
            <div class="col-12 col-md-6">
                <label class="form-label fw-bold small text-uppercase text-muted">Apellido</label>
                <input type="text" name="apellido" value="{{ user.last_name }}"
                    class="form-control stokka-input bg-light shadow-none">
            </div>

            <div class="col-12 col-md-6">
                <label class="form-label fw-bold small text-uppercase text-muted">Correo electrónico</label>
                <input type="email" name="email" value="{{ user.email }}"
                    class="form-control stokka-input bg-light shadow-none">
            </div>

            <div class="col-12 col-md-6">
                <label class="form-label fw-bold small text-uppercase text-muted">Teléfono</label>
                <input type="text" name="telefono" value="{{ perfil.telefono|default:'' }}"
                    class="form-control stokka-input bg-light shadow-none">
            </div>

            <div class="col-12 mt-2">
                <div class="p-3 rounded-4 border-start border-4"
                    style="background-color: #f0f9f0; border-color: var(--verde-stokka) !important;">
                    <h6 class="fw-bold text-dark mb-3 small">
                        <i class="fa-solid fa-key me-2" style="color: var(--verde-stokka);"></i>SEGURIDAD
                    </h6>
                    <div class="row g-3">
                        <div class="col-12 col-md-6">
                            <label class="form-label fw-bold extra-small text-muted text-uppercase">Nueva Clave</label>
                            <div class="position-relative d-flex align-items-center">
                                <input type="password" name="password" id="id_password_new"
                                    class="form-control form-control-sm stokka-input bg-white shadow-none w-100"
                                    placeholder="Nueva contraseña"
                                    oninput="checkInput('id_password_new', 'toggleIconNew')"
                                    style="padding-right: 40px;"> <i class="fa-regular fa-eye position-absolute d-none"
                                    id="toggleIconNew" onclick="togglePassword('id_password_new', 'toggleIconNew')"
                                    style="right: 15px; cursor: pointer; color: var(--verde-stokka); z-index: 10; font-size: 0.9rem;">
                                </i>
                            </div>
                        </div>

                        <div class="col-12 col-md-6">
                            <label class="form-label fw-bold extra-small text-muted text-uppercase">Confirmar</label>
                            <div class="position-relative d-flex align-items-center">
                                <input type="password" name="confirm_password" id="id_password_confirm"
                                    class="form-control form-control-sm stokka-input bg-white shadow-none w-100"
                                    placeholder="Repite la contraseña"
                                    oninput="checkInput('id_password_confirm', 'toggleIconConfirm')"
                                    style="padding-right: 40px;">

                                <i class="fa-regular fa-eye position-absolute d-none" id="toggleIconConfirm"
                                    onclick="togglePassword('id_password_confirm', 'toggleIconConfirm')"
                                    style="right: 15px; cursor: pointer; color: var(--verde-stokka); z-index: 10; font-size: 0.9rem;">
                                </i>
                            </div>
                        </div>
                    </div>

                    <div class="d-flex align-items-center mt-3 text-muted">
                        <i class="fa-solid fa-circle-info me-2 small"></i>
                        <small class="fst-italic" style="font-size: 0.75rem;">
                            Deja estos campos vacíos si no deseas cambiar tu contraseña.
                        </small>
                    </div>
                </div>
            </div>

            <div class="col-12 d-flex flex-column flex-md-row gap-2 justify-content-md-end mt-4">
                <button type="button"
                    class="btn btn-cancelar-stokka px-4 py-2 rounded-3 fw-bold text-uppercase small order-2 order-md-1"
                    data-bs-dismiss="modal">
                    Cancelar
                </button>
                <button type="submit"
                    class="btn btn-stokka px-md-5 py-2 rounded-3 fw-bold text-uppercase shadow-sm order-1 order-md-2">
                    <i class="fa-solid fa-floppy-disk me-2"></i>Guardar Cambios
                </button>
            </div>
        </div>
    </form>
</div>
