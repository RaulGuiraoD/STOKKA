{% load static %}
<div class="px-3 pb-2">
    <div class="text-center mb-4">
        <div class="d-flex align-items-center justify-content-center gap-2 mb-1" style="color: var(--verde-stokka);">
            <i class="fa-solid fa-user-pen fs-3"></i>
            <h3 class="fw-bold m-0">Editar Información</h3>
        </div>
        <p class="text-muted small">Actualiza tus datos personales y de seguridad</p>
    </div>

    <form method="POST" action="{% url 'editar_perfil' %}">
        {% csrf_token %}
        <div class="row g-3">
            <div class="col-md-6">
                <label class="small text-uppercase fw-bold text-muted d-block mb-1">Nombre</label>
                <input type="text" name="nombre" value="{{ user.first_name }}" 
                       class="form-control stokka-input bg-light shadow-none">
            </div>
            <div class="col-md-6">
                <label class="small text-uppercase fw-bold text-muted d-block mb-1">Apellido</label>
                <input type="text" name="apellido" value="{{ user.last_name }}" 
                       class="form-control stokka-input bg-light shadow-none">
            </div>
            <div class="col-12">
                <label class="small text-uppercase fw-bold text-muted d-block mb-1">Correo electrónico</label>
                <input type="email" name="email" value="{{ user.email }}" 
                       class="form-control stokka-input bg-light shadow-none">
            </div>
            <div class="col-12">
                <label class="small text-uppercase fw-bold text-muted d-block mb-1">Teléfono</label>
                <input type="text" name="telefono" value="{{ perfil.telefono|default:'' }}" 
                       class="form-control stokka-input bg-light shadow-none">
            </div>

            <div class="col-12 mt-4">
                <div class="p-3 rounded-4 border-start border-4 shadow-sm" 
                     style="background-color: var(--verde-stokka-light); border-color: var(--verde-stokka) !important;">
                    
                    <h6 class="fw-bold mb-3" style="color: var(--verde-stokka);">
                        <i class="fa-solid fa-lock me-2"></i>Seguridad
                    </h6>
                    
                    <div class="row g-2">
                        <div class="col-md-6">
                            <label class="extra-small text-uppercase fw-bold text-muted d-block mb-1">Nueva Clave</label>
                            <input type="password" name="password" 
                                   class="form-control form-control-sm stokka-input bg-white shadow-none">
                        </div>
                        <div class="col-md-6">
                            <label class="extra-small text-uppercase fw-bold text-muted d-block mb-1">Repetir</label>
                            <input type="password" name="confirm_password" 
                                   class="form-control form-control-sm stokka-input bg-white shadow-none">
                        </div>
                    </div>
                    
                    <div class="d-flex align-items-center mt-3 text-muted">
                        <i class="fa-solid fa-circle-info me-2 small"></i>
                        <small class="fst-italic" style="font-size: 0.75rem;">
                            Deja estos campos vacíos si no deseas cambiar tu contraseña.
                        </small>
                    </div>
                </div>
            </div>

            <div class="col-12 text-end mt-4 pt-3 border-top d-flex justify-content-end gap-2">
                <button type="button" class="btn btn-cancelar-stokka px-4 py-2 small" data-bs-dismiss="modal">
                    Cancelar
                </button>
                <button type="submit" class="btn btn-stokka px-4 py-2 shadow-sm">
                    <i class="fa-solid fa-floppy-disk me-2"></i>Guardar Cambios
                </button>
            </div>
        </div>
    </form>
</div>
