{% load static %}
<div class="px-3 pb-3">
    <div class="text-center mb-4">
        <h3 class="fw-bold" style="color: var(--verde-stokka);">Editar Información</h3>
        <p class="text-muted small">Actualiza tus datos personales y de seguridad</p>
    </div>

    <form method="POST" action="{% url 'editar_perfil' %}">
        {% csrf_token %}
        <div class="row g-3">
            <div class="col-md-6">
                <label class="small text-uppercase fw-bold text-muted d-block mb-1">Nombre</label>
                <input type="text" name="nombre" value="{{ user.first_name }}" 
                       class="form-control border-light-subtle rounded-3 bg-light shadow-focus-stokka">
            </div>
            <div class="col-md-6">
                <label class="small text-uppercase fw-bold text-muted d-block mb-1">Apellido</label>
                <input type="text" name="apellido" value="{{ user.last_name }}" 
                       class="form-control border-light-subtle rounded-3 bg-light shadow-focus-stokka">
            </div>
            <div class="col-12">
                <label class="small text-uppercase fw-bold text-muted d-block mb-1">Correo electrónico</label>
                <input type="email" name="email" value="{{ user.email }}" 
                       class="form-control border-light-subtle rounded-3 bg-light shadow-focus-stokka">
            </div>
            <div class="col-12">
                <label class="small text-uppercase fw-bold text-muted d-block mb-1">Teléfono</label>
                <input type="text" name="telefono" value="{{ perfil.telefono|default:'' }}" 
                       class="form-control border-light-subtle rounded-3 bg-light shadow-focus-stokka">
            </div>

            <div class="col-12 mt-3">
                <div class="p-3 rounded-4 border-start border-4 shadow-sm" style="background-color: var(--verde-stokka-light); border-color: var(--verde-stokka) !important;">
                    <h6 class="fw-bold mb-2" style="color: var(--verde-stokka);">
                        <i class="fa-solid fa-lock me-2"></i>Seguridad
                    </h6>
                    <div class="row g-2">
                        <div class="col-md-6">
                            <label class="extra-small text-uppercase fw-bold text-muted d-block mb-1">Nueva Clave</label>
                            <input type="password" name="password" class="form-control form-control-sm border-light-subtle rounded-3 bg-white">
                        </div>
                        <div class="col-md-6">
                            <label class="extra-small text-uppercase fw-bold text-muted d-block mb-1">Repetir</label>
                            <input type="password" name="confirm_password" class="form-control form-control-sm border-light-subtle rounded-3 bg-white">
                        </div>
                    </div>
                    <small class="text-muted mt-3 d-block italic">
                            <i class="fa-solid fa-circle-info me-1" style= "color: black"></i> Deja estos campos vacíos si no deseas cambiar tu contraseña.
                    </small>
                </div>
            </div>

            <div class="col-12 text-end mt-4 pt-3 border-top">
                <button type="button" class="btn btn-cancelar-stokka px-4 py-2 rounded-3 fw-bold text-uppercase small" data-bs-dismiss="modal">Cancelar</button>
                <button type="submit" class="btn btn-stokka px-5 py-2 rounded-3 fw-bold text-uppercase shadow-sm">
                    <i class="fa-solid fa-floppy-disk me-2"></i>Guardar Cambios
                </button>
            </div>
        </div>
    </form>
</div>
