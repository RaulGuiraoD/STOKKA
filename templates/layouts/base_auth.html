{% load static %}
<!DOCTYPE html>
<html lang="es" class="h-100">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}STOKKA{% endblock title %}</title>

    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@300;400;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="{% static 'css/estilos.css' %}">
</head>

<body class="d-flex flex-column h-100">

    <section class="bg-stokka flex-grow-1 d-flex flex-column align-items-center justify-content-center py-5 text-white">
        
        <h1 class="auth-logo-top text-center text-uppercase mb-5">STOKKA</h1>

        <div class="container d-flex justify-content-center align-items-center">
            {% block content %}{% endblock content %}
        </div>
    </section>

    <footer class="bg-white py-5 border-top mt-auto">
        <div class="container">
            <div class="row g-4 align-items-start">
                <div class="col-md-2 border-end d-flex flex-md-column flex-row justify-content-center align-items-center gap-3 pe-md-4">
                    <a href="#" class="btn bg-stokka text-white rounded-3 social-btn-fix"><i class="fa-brands fa-x-twitter"></i></a>
                    <a href="#" class="btn bg-stokka text-white rounded-3 social-btn-fix"><i class="fa-brands fa-linkedin-in"></i></a>
                    <a href="#" class="btn bg-stokka text-white rounded-3 social-btn-fix"><i class="fa-brands fa-instagram"></i></a>
                    <a href="#" class="btn bg-stokka text-white rounded-3 social-btn-fix"><i class="fa-brands fa-youtube"></i></a>
                </div>

                <div class="col-md-10 ps-md-5">
                    <div class="row text-center text-sm-start">
                        <div class="col-6 col-sm-4">
                            <p class="fw-bold text-stokka text-uppercase small mb-3">Contacto</p>
                            <ul class="list-unstyled small text-muted">
                                <li class="mb-2">Soporte Técnico</li>
                                <li class="mb-2">Ventas</li>
                                <li class="mb-2">Prensa</li>
                            </ul>
                        </div>
                        <div class="col-6 col-sm-4">
                            <p class="fw-bold text-stokka text-uppercase small mb-3">Explorar</p>
                            <ul class="list-unstyled small text-muted">
                                <li class="mb-2">Funcionalidades</li>
                                <li class="mb-2">Precios</li>
                                <li class="mb-2">Blog</li>
                            </ul>
                        </div>
                        <div class="col-12 col-sm-4 mt-4 mt-sm-0">
                            <p class="fw-bold text-stokka text-uppercase small mb-3">Recursos</p>
                            <ul class="list-unstyled small text-muted">
                                <li class="mb-2">Documentación</li>
                                <li class="mb-2">Privacidad</li>
                                <li class="mb-2">Términos</li>
                            </ul>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{% static 'js/general.js' %}"></script>
</body>
</html>
