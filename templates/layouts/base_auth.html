{% load static %}
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}STOKKA{% endblock title %}</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@300;400;700&display=swap" rel="stylesheet">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <style>
        :root {
            --verde-stokka: #003D00;
        }

        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Merriweather', serif;
            display: flex;
            flex-direction: column;
        }

        /* Contenedor Superior Verde */
        .auth-wrapper {
            background-color: var(--verde-stokka);
            min-height: 85vh; /* Aumentado para dar más espacio al verde */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start; /* Alinea al principio para que el logo mande */
            padding: 5rem 1rem; 
            color: white;
            flex-grow: 1;
        }

        .auth-logo-top {
            font-size: clamp(4rem, 20vw, 6rem) !important; 
            font-style: italic;
            font-weight: 700;
            line-height: 0.7; 
            margin-bottom: 2rem; 
            text-align: center;
            text-transform: uppercase;
            opacity: 0.95;
            user-select: none;
        }

        /* Footer Blanco */
        .footer-auth {
            background: white;
            color: #333;
            border-top: 1px solid #eee;
        }

        .social-btn {
            width: 40px;
            height: 40px;
            background: var(--verde-stokka);
            color: white !important;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            border-radius: 8px;
            transition: 0.3s;
        }

        .social-btn:hover {
            transform: translateY(-3px);
            opacity: 0.9;
        }

        .footer-col-title {
            color: var(--verde-stokka);
            font-weight: 700;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 1rem;
        }

        .footer-link-list {
            list-style: none;
            padding: 0;
            margin: 0;
            font-size: 0.85rem;
        }

        .footer-link-list li {
            margin-bottom: 0.5rem;
            color: #666;
        }

        /* Ajuste para que el grid no se rompa en móviles */
        @media (min-width: 768px) {
            .border-end-md {
                border-right: 1px solid #eee !important;
            }
        }
    </style>
</head>

<body>
    <section class="auth-wrapper">
        <h1 class="auth-logo-top">STOKKA</h1>
        
        <div class="container d-flex justify-content-center align-items-start">
            {% block content %}{% endblock content %}
        </div>
    </section>

    <footer class="footer-auth py-5">
        <div class="container">
            <div class="row g-4 align-items-start">
                <div class="col-md-2 border-end-md d-flex flex-md-column flex-row justify-content-center align-items-center gap-3 pe-md-4">
                    <a href="#" class="social-btn"><i class="fa-brands fa-x-twitter"></i></a>
                    <a href="#" class="social-btn"><i class="fa-brands fa-linkedin-in"></i></a>
                    <a href="#" class="social-btn"><i class="fa-brands fa-instagram"></i></a>
                    <a href="#" class="social-btn"><i class="fa-brands fa-youtube"></i></a>
                </div>

                <div class="col-md-10 ps-md-5">
                    <div class="row">
                        <div class="col-6 col-sm-4 text-center text-sm-start">
                            <p class="footer-col-title">Contacto</p>
                            <ul class="footer-link-list">
                                <li>Soporte Técnico</li>
                                <li>Ventas</li>
                                <li>Prensa</li>
                            </ul>
                        </div>
                        <div class="col-6 col-sm-4 text-center text-sm-start">
                            <p class="footer-col-title">Explorar</p>
                            <ul class="footer-link-list">
                                <li>Funcionalidades</li>
                                <li>Precios</li>
                                <li>Blog</li>
                            </ul>
                        </div>
                        <div class="col-12 col-sm-4 text-center text-sm-start mt-4 mt-sm-0">
                            <p class="footer-col-title">Recursos</p>
                            <ul class="footer-link-list">
                                <li>Documentación</li>
                                <li>Privacidad</li>
                                <li>Términos</li>
                            </ul>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
