{% load static %}
<!DOCTYPE html>
<html lang="es" class="h-100">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}STOKKA{% endblock title %}</title>

    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@300;400;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="{% static 'css/estilos.css' %}">
    <link rel="icon" type="image/png" href="{% static 'assets/Logo_Stokka3.png' %}">
</head>

<body class="d-flex flex-column h-100">

    <section class="bg-stokka flex-grow-1 d-flex flex-column align-items-center justify-content-center py-5 text-white">
        
        <h1 class="auth-logo-top text-center text-uppercase mb-5">STOKKA</h1>

        <div class="container d-flex justify-content-center align-items-center">
            {% block content %}{% endblock content %}
        </div>
    </section>

    <footer class="bg-white py-5 border-top mt-auto">
        <div class="container">
            <div class="row g-4 align-items-start">
                
                <div class="col-md-2 border-end d-flex flex-md-column flex-row justify-content-center align-items-center gap-3 pe-md-4">
                    <a href="{% url 'linkedin_team' %}" class="btn bg-stokka text-white rounded-3 social-btn-fix" title="LinkedIn Equipo">
                        <i class="fa-brands fa-linkedin-in"></i>
                    </a>
                    <a href="https://www.instagram.com/stokka_inc/" target="_blank" rel="noopener noreferrer" class="btn bg-stokka text-white rounded-3 social-btn-fix" title="Instagram STOKKA">
                        <i class="fa-brands fa-instagram"></i>
                    </a>
                    <a href="https://x.com/Stokka_Inc" target="_blank" rel="noopener noreferrer" class="btn bg-stokka text-white rounded-3 social-btn-fix" title="X (Twitter) STOKKA">
                        <i class="fa-brands fa-x-twitter"></i>
                    </a>
                </div>

                <div class="col-md-10 ps-md-5">
                    <div class="row text-center text-sm-start">
                        
                        <div class="col-6 col-sm-4">
                            <p class="fw-bold text-stokka text-uppercase small mb-3">Compañía</p>
                            <ul class="list-unstyled small">
                                <li class="mb-2">
                                    <a href="{% url 'linkedin_team' %}" class="text-decoration-none text-muted">
                                        <i class="fa-solid fa-users me-2 text-stokka"></i>Equipo STOKKA
                                    </a>
                                </li>
                                <li class="mb-2">
                                    <a href="mailto:stokka.app@gmail.com" class="text-decoration-none text-muted">
                                        <i class="fa-solid fa-envelope me-2 text-stokka"></i>Contacto Directo
                                    </a>
                                </li>
                            </ul>
                        </div>
                        
                        <div class="col-6 col-sm-4">
                            <p class="fw-bold text-stokka text-uppercase small mb-3">Plataforma</p>
                            <ul class="list-unstyled small text-muted">
                                <li class="mb-2">
                                    <i class="fa-solid fa-code-branch me-2 text-stokka"></i>Versión 1.0.0
                                </li>
                                <li class="mb-2">
                                    <i class="fa-solid fa-shield-halved me-2 text-stokka"></i>Entorno Seguro SSL
                                </li>
                            </ul>
                        </div>

                    </div>
                </div>
                
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{% static 'js/general.js' %}"></script>
</body>
</html>
